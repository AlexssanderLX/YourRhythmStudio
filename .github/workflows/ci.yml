name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./YourRhythmStudio.slnx

      - name: Build
        run: dotnet build ./YourRhythmStudio.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ./Tests/YourRhythmStudio.Tests.csproj --configuration Release --no-build --verbosity normal
